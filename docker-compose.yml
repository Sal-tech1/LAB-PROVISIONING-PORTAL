version: '3.8'

services:
  # ---------------------------------------------------------
  # INFRASTRUCTURE & NETWORKING
  # ---------------------------------------------------------
  student-lab:
    image: lab-alpine:v2        
    container_name: alpine-lab-1
    ports:
      - "8080:8080"             
    networks:
      - portal-bridge           
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped                    # auto-restart if it crashes

    ports:
      - "9090:9090"                            # http://localhost:9090

    volumes:
      # Mount our config file into the container so Prometheus uses it
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Mount our alert rules file
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      # Store Prometheus data on your machine (survives container restarts)
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"    # keep 7 days of data
      - "--web.enable-lifecycle"               # allows config reload without restart

    networks:
      - monitoring

  # ── Node Exporter ───────────────────────────────────────────────────────────
  # The "reporter" that exposes your host machine's stats as a /metrics URL.
  # Prometheus reads from this URL every 15 seconds.
  # You can visit http://localhost:9100/metrics to see raw stats yourself.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped

    ports:
      - "9100:9100"                            # http://localhost:9100/metrics

    volumes:
      # These mounts let node-exporter read host system information
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

    networks:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # The visual dashboard. Reads data from Prometheus and displays it as charts.
  # Access Grafana at: http://localhost:3000
  # Default login: admin / admin (you will be asked to change it on first login)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"                            # http://localhost:3000

    environment:
      # Set the admin password directly so you don't need to reset it on first run
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=labportal123
      - GF_USERS_ALLOW_SIGN_UP=false           # only admins can create accounts

    volumes:
      # Store Grafana dashboards and settings on your machine
      - grafana_data:/var/lib/grafana
      # Auto-provision Prometheus as a datasource on first start
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

    depends_on:
      - prometheus                             # start Prometheus first

    networks:
      - monitoring

# ── Named volumes ─────────────────────────────────────────────────────────────
# These store data on your machine so it survives container restarts
volumes:
  prometheus_data:
    name: lab_prometheus_data
  grafana_data:
    name: lab_grafana_data

# The custom network that Member 4 will connect to later
networks:
  portal-bridge:
    driver: bridge